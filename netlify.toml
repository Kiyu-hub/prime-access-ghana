# ============================================================
# Clasikal Homes — Netlify deploy config
# Static PWA, no build step. Publishes the repo root.
# ============================================================

[build]
  # No bundler / npm install — vanilla HTML/CSS/JS.
  publish = "."
  command = ""

# --- Default: short-cache so the PWA gets fresh code quickly ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# --- HTML entry points: never cache, always revalidate ---
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# --- Service worker: NEVER cache. The whole update flow depends on
#     the browser fetching a fresh sw.js each time. ---
[[headers]]
  for = "/scripts/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# --- Manifest: short cache, correct MIME ---
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=300"

# --- JS / CSS: short cache (SW does network-first too) ---
[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# --- Images / fonts: longer cache (rarely change) ---
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# --- Tidy URLs: visiting /dashboard serves dashboard.html ---
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/index.html"
  status = 200
